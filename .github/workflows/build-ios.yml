name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Instalar Expo CLI
        run: npm install -g @expo/cli

      - name: Generar proyecto Xcode
        run: npx expo prebuild --platform ios --no-install

      - name: Instalar CocoaPods
        run: |
          cd ios
          pod install

      - name: Ver archivos iOS generados
        run: |
          echo "=== Contenido de ios/ ==="
          ls -la ios/
          echo "=== Workspaces ==="
          find ios -maxdepth 1 -name "*.xcworkspace" -type d
          echo "=== Schemes ==="
          find ios -maxdepth 1 -name "*.xcworkspace" -type d -exec xcodebuild -workspace {} -list \; 2>/dev/null || true

      - name: Compilar app (sin firma)
        run: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          echo "Workspace encontrado: $WORKSPACE"
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null \
            | awk '/Schemes:/,/^$/' | grep -v "Schemes:" | grep -v "^$" | head -1 | xargs)
          echo "Scheme encontrado: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$PWD/ios/build/creatina.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Crear archivo IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find ios/build/creatina.xcarchive/Products/Applications -name "*.app" | head -1)
          echo "App encontrada: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r creatina-reminder.ipa Payload/

      - name: Subir IPA como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: creatina-reminder-ipa
          path: creatina-reminder.ipa
          retention-days: 30
